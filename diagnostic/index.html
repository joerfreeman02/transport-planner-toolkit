<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Accessibility Engine Diagnostic 0.1</title><style>body{font-family:system-ui;margin:0;background:#f4f6f6;color:#17201f}main{max-width:1000px;margin:auto;padding:24px}section{background:#fff;border:1px solid #d7dddd;border-radius:10px;padding:18px;margin:14px 0}input,button{font:inherit;padding:9px;border-radius:6px;border:1px solid #aaa}button{background:#07544f;color:#fff;font-weight:700}pre{white-space:pre-wrap;background:#f3f6f5;padding:12px;max-height:320px;overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #ddd;padding:7px;text-align:left}.ok{color:#087451}.bad{color:#a22}</style></head><body><main><h1>Accessibility Engine Diagnostic 0.1</h1><section><h2>1 Location</h2><input id="address" value="100 High Street, Plaistow, London" style="width:70%"><button id="geo">Geocode</button><div id="ls"></div><pre id="lo">Not run.</pre></section><section><h2>2 Facilities</h2><label>Radius <input id="radius" type="number" value="2000"></label> <button id="fac" disabled>Run one primary download</button><div id="fs"></div><pre id="fo">Not run.</pre><table id="ft"></table></section><section><h2>3 Routing</h2><button id="route" disabled>Route selected facilities</button><div id="rs"></div><table id="rt"></table></section></main><script type="module">import{geocodeUK}from'../src/engines/location-engine.mjs';import{buildPrimaryQuery,queryOverpass}from'../src/engines/facility-data-engine.mjs';import{classifyAll}from'../src/engines/classification-engine.mjs';import{route}from'../src/engines/routing-engine.mjs';let site=null,nearest={};const $=id=>document.getElementById(id),fd=m=>m==null?'—':m<1000?Math.round(m)+' m':(m/1000).toFixed(1)+' km',ft=s=>s==null?'—':Math.max(1,Math.round(s/60))+' min';$('geo').onclick=async()=>{try{const m=await geocodeUK($('address').value);site=m[0];$('lo').textContent=JSON.stringify(m,null,2);$('ls').innerHTML='<p class="ok"><b>'+site.addressLabel+'</b><br>'+site.latitude+', '+site.longitude+'</p>';$('fac').disabled=false}catch(e){$('ls').innerHTML='<p class="bad">'+e.message+'</p>'}};$('fac').onclick=async()=>{try{$('fs').textContent='Running one request…';const r=await queryOverpass(buildPrimaryQuery(site.latitude,site.longitude,Number($('radius').value)));$('fo').textContent=JSON.stringify({ok:r.ok,endpoint:r.endpoint,elapsedMs:r.elapsedMs,elementCount:r.elements.length,attempts:r.attempts},null,2);if(!r.ok)throw new Error(r.error);nearest=classifyAll(r.elements,site).nearest;const rows=Object.values(nearest).sort((a,b)=>a.straightLineM-b.straightLineM);$('ft').innerHTML='<tr><th>Category</th><th>Name</th><th>Straight-line</th><th>Evidence</th></tr>'+rows.map(x=>`<tr><td>${x.category}</td><td>${x.name}</td><td>${fd(x.straightLineM)}</td><td>${x.evidence.matched}</td></tr>`).join('');$('fs').innerHTML='<p class="ok">'+r.elements.length+' raw features; '+rows.length+' categories.</p>';$('route').disabled=!rows.length}catch(e){$('fs').innerHTML='<p class="bad">'+e.message+'</p>'}};$('route').onclick=async()=>{const rows=Object.values(nearest).sort((a,b)=>a.straightLineM-b.straightLineM),out=[];$('rs').textContent='Routing…';for(const x of rows){out.push({x,w:await route(site,x,'walk'),c:await route(site,x,'cycle')})}$('rt').innerHTML='<tr><th>Category</th><th>Facility</th><th>Walking</th><th>Cycling</th></tr>'+out.map(o=>`<tr><td>${o.x.category}</td><td>${o.x.name}</td><td>${fd(o.w.distanceM)} / ${ft(o.w.durationS)} (${o.w.status})</td><td>${fd(o.c.distanceM)} / ${ft(o.c.durationS)} (${o.c.status})</td></tr>`).join('');$('rs').innerHTML='<p class="ok">Routing completed.</p>'};</script></body></html>
